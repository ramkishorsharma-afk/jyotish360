<!DOCTYPE html>
<html>
<head>
    <title>Jyotish360</title>
</head>
<body>

<h2>Jyotish360 🔮</h2>

<input id="name" placeholder="Name"><br><br>
<input id="dob" placeholder="DOB (DD-MM-YYYY)"><br><br>
<input id="time" placeholder="Time (HH:MM 24hr)"><br><br>
<input id="place" placeholder="Place"><br><br>

<button onclick="generate()">Get Reading</button>

<div id="result"></div>

<button onclick="pay()">Unlock Next 2 Hours (₹9)</button>

<script>
async function generate() {

    const name = document.getElementById('name').value;
    const dob = document.getElementById('dob').value;
    const time = document.getElementById('time').value;
    const place = document.getElementById('place').value;

    if (!dob || !time) {
        alert("Please enter DOB and Time correctly");
        return;
    }

    const res = await fetch('/generate', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({
            name,
            dob,
            time,
            place
        })
    });

    const data = await res.json();

    if (!data.success) {
        document.getElementById('result').innerHTML =
            `<p style="color:red;">${data.message}</p>`;
        return;
    }

    document.getElementById('result').innerHTML =
        `<h3>🔮 Past Life Insight</h3>
         <p>${data.data.pastLife}</p>

         <h3>⏳ Last 2 Hours</h3>
         <p>${data.data.last2Hours}</p>

         <h3>🔒 Next 2 Hours</h3>
         <p>Locked 🔐</p>`;
}

async function pay() {
    const res = await fetch('/create-order', { method: 'POST' });
    const order = await res.json();

    const options = {
        key: "YOUR_KEY_ID",
        amount: order.amount,
        currency: order.currency,
        name: "Jyotish360",
        order_id: order.id,
        handler: function (response){
            alert("Payment Success! 🚀");
        }
    };

    const rzp = new Razorpay(options);
    rzp.open();
}
</script>

<script src="https://checkout.razorpay.com/v1/checkout.js"></script>

</body>
</html>
