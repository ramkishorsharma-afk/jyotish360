<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Karma Check</title>

<style>
body {
    font-family: Arial;
    background: #0f172a;
    color: white;
    text-align: center;
    padding: 20px;
}
.container {
    max-width: 500px;
    margin: auto;
}
input, button {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    border-radius: 8px;
    border: none;
}
button {
    background: #f97316;
    color: white;
    font-weight: bold;
}
.card {
    background: #1e293b;
    padding: 15px;
    border-radius: 10px;
    margin-top: 10px;
}
.hidden { display: none; }

.chart {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 5px;
}
.box {
    border: 1px solid #fff;
    min-height: 70px;
    padding: 5px;
    font-size: 12px;
}

.lock {
    filter: blur(5px);
}
</style>
</head>

<body>

<div class="container">

<h2>🔮 Check Your Karma</h2>

<div id="form">
    <input type="date" id="dob">
    <input type="time" id="time">
    <input type="text" id="place" placeholder="Enter Place">
    <button onclick="generate()">Check</button>
</div>

<div id="loading" class="hidden">
    <p>🔍 Reading your karma...</p>
</div>

<div id="result" class="hidden">

    <!-- Kundli -->
    <div class="card">
        <h3>🪐 Kundli Chart</h3>
        <div class="chart">
            <div class="box" id="h1"></div>
            <div class="box" id="h2"></div>
            <div class="box" id="h3"></div>
            <div class="box" id="h4"></div>
            <div class="box" id="h5"></div>
            <div class="box" id="h6"></div>
            <div class="box" id="h7"></div>
            <div class="box" id="h8"></div>
            <div class="box" id="h9"></div>
            <div class="box" id="h10"></div>
            <div class="box" id="h11"></div>
            <div class="box" id="h12"></div>
        </div>
    </div>

    <!-- Karma -->
    <div class="card">
        <h3 id="shock"></h3>
        <p>Karma Score: <span id="score"></span>%</p>
    </div>

    <!-- Life Events -->
    <div class="card">
        <h4>Life Events</h4>
        <ul id="life"></ul>
    </div>

    <!-- Symptoms -->
    <div class="card">
        <h4>Symptoms</h4>
        <ul id="symptoms"></ul>
    </div>

    <!-- Remedies -->
    <div class="card">
        <h4>Remedies</h4>
        <ul id="remedies"></ul>
    </div>

    <!-- Last 2 Hours -->
    <div class="card">
        <h4>Last 2 Hours</h4>
        <ul id="last"></ul>
    </div>

    <!-- Locked -->
    <div class="card lock">
        <h4>Next 2 Hours 🔒</h4>
        <p>Hidden insights...</p>
    </div>

    <button onclick="unlock()">🔓 Unlock ₹19</button>

</div>

</div>

<script>
async function generate() {

    document.getElementById("form").classList.add("hidden");
    document.getElementById("loading").classList.remove("hidden");

    try {

        const dob = document.getElementById("dob").value;
        const time = document.getElementById("time").value;
        const place = document.getElementById("place").value;

        const res = await fetch("/generate", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ dob, time, place })
        });

        const data = await res.json();

        console.log("🔥 API RESPONSE:", data);

        // ❌ HANDLE FAILURE FIRST
        if (!data.success) {
            document.getElementById("loading").classList.add("hidden");
            alert(data.message || "API Failed");
            return;
        }

        const result = data.data;

        document.getElementById("loading").classList.add("hidden");
        document.getElementById("result").classList.remove("hidden");

        // ✅ SAFE SET VALUES
        document.getElementById("shock").innerText = result.shockLine || "No Data";
        document.getElementById("score").innerText = result.karmaScore || 0;

        // CLEAR OLD DATA
        document.getElementById("life").innerHTML = "";
        document.getElementById("symptoms").innerHTML = "";
        document.getElementById("remedies").innerHTML = "";
        document.getElementById("last").innerHTML = "";

        // FILL DATA
        (result.lifeEvents || []).forEach(e => {
            document.getElementById("life").innerHTML += `<li>${e}</li>`;
        });

        (result.symptoms || []).forEach(e => {
            document.getElementById("symptoms").innerHTML += `<li>${e}</li>`;
        });

        (result.remedies || []).forEach(e => {
            document.getElementById("remedies").innerHTML += `<li>🪔 ${e}</li>`;
        });

        (result.last2Hours || []).forEach(e => {
            document.getElementById("last").innerHTML += `<li>${e}</li>`;
        });

        // 🔮 KUNDLI FIX
        for (let i = 1; i <= 12; i++) {
            document.getElementById("h" + i).innerHTML = `<b>H${i}</b>`;
        }

        if (result.kundali && result.kundali.planets) {
            result.kundali.planets.forEach(p => {
                if (!p.house) return;

                document.getElementById("h" + p.house).innerHTML +=
                    `<div>${p.name}</div>`;
            });
        }

    } catch (err) {
        console.error("❌ ERROR:", err);
        alert("Something broke. Check console.");
    }
}
</script>

</body>
</html>
