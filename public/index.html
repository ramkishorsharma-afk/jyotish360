<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Karma Check</title>

<style>
body {
    font-family: Arial;
    background: #0f172a;
    color: white;
    text-align: center;
    padding: 20px;
}
.container {
    max-width: 400px;
    margin: auto;
}
input, button {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    border-radius: 8px;
    border: none;
}
button {
    background: #f97316;
    color: white;
    font-weight: bold;
}
.hidden { display: none; }
.card {
    background: #1e293b;
    padding: 15px;
    border-radius: 10px;
    margin-top: 10px;
}
.lock {
    filter: blur(5px);
}
</style>
</head>

<body>

<div class="container">

<h2>🔮 Check Your Karma</h2>

<div id="form">
    <input type="date" id="dob">
    <input type="time" id="time">
    <input type="text" id="place" placeholder="Enter Place">
    <button onclick="generate()">Reveal My Karma</button>
</div>

<div id="loading" class="hidden">
    <p>🔍 Reading your karma...</p>
    <p>📊 Analyzing planets...</p>
</div>
<div class="card">
    <h4>🪐 Your Kundli</h4>
    <div id="kundli"></div>
</div>
<div id="result" class="hidden">

    <div class="card">
        <h3 id="shock"></h3>
        <p>Karma Score: <span id="score"></span>%</p>
    </div>

    <div class="card">
        <h4>Life Events</h4>
        <ul id="life"></ul>
    </div>

    <div class="card">
        <h4>Symptoms</h4>
        <ul id="symptoms"></ul>
    </div>

    <div class="card">
        <h4>Last 2 Hours</h4>
        <ul id="last"></ul>
    </div>

    <div class="card lock" id="locked">
        <h4>Next 2 Hours 🔒</h4>
        <p>Hidden insights...</p>
    </div>

    <button onclick="unlock()">🔓 Unlock ₹19</button>

</div>

</div>

<script>
const API = "https://jyotish360.onrender.com";

async function generate() {

    document.getElementById("form").classList.add("hidden");
    document.getElementById("loading").classList.remove("hidden");

    const dob = document.getElementById("dob").value;
    const time = document.getElementById("time").value;
    const place = document.getElementById("place").value;

    const res = await fetch(API + "/generate", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ dob, time, place })
    });

    const data = await res.json();

    document.getElementById("loading").classList.add("hidden");
    document.getElementById("result").classList.remove("hidden");

    document.getElementById("shock").innerText = data.data.shockLine;
    document.getElementById("score").innerText = data.data.karmaScore;

    data.data.lifeEvents.forEach(e => {
        document.getElementById("life").innerHTML += `<li>${e}</li>`;
    });

    data.data.symptoms.forEach(e => {
        document.getElementById("symptoms").innerHTML += `<li>${e}</li>`;
    });

    data.data.last2Hours.forEach(e => {
        document.getElementById("last").innerHTML += `<li>${e}</li>`;
    });

}

function unlock() {
    alert("Integrate Razorpay here 💰");
}
</script>

</body>
</html>
