<style>
    body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        /* Universe Background */
        background: linear-gradient(rgba(15, 23, 42, 0.8), rgba(15, 23, 42, 0.8)), 
                    url('https://images.unsplash.com/photo-1464802686167-b939a6910659?ixlib=rb-1.2.1&auto=format&fit=crop&w=1920&q=80');
        background-size: cover;
        background-attachment: fixed;
        background-position: center;
        color: white;
        text-align: center;
        padding: 20px;
        margin: 0;
    }
    .container {
        max-width: 500px;
        margin: auto;
    }
    /* Glassmorphism Effect for Cards */
    .card {
        background: rgba(30, 41, 59, 0.7);
        backdrop-filter: blur(10px);
        padding: 15px;
        border-radius: 15px;
        margin-top: 15px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
    }
    input, button {
        width: 100%;
        padding: 14px;
        margin: 10px 0;
        border-radius: 10px;
        border: none;
        box-sizing: border-box;
    }
    button {
        background: linear-gradient(45deg, #f97316, #ea580c);
        color: white;
        font-weight: bold;
        cursor: pointer;
        transition: transform 0.2s;
    }
    button:hover {
        transform: scale(1.02);
    }
    .chart {
        display: grid;
        grid-template-columns: repeat(3, 1fr); /* 3x4 grid for better mobile view */
        gap: 8px;
    }
    .box {
        border: 1px solid rgba(255, 255, 255, 0.3);
        background: rgba(0, 0, 0, 0.3);
        min-height: 80px;
        padding: 5px;
        font-size: 11px;
        border-radius: 5px;
    }
    .box b { color: #f97316; display: block; margin-bottom: 3px; }
    .hidden { display: none; }
    .lock { filter: blur(8px); opacity: 0.5; pointer-events: none; }
    ul { text-align: left; padding-left: 20px; list-style-type: '✨ '; }
</style>

<div class="card">
    <h4>🏠 Vastu Tips</h4>
    <ul id="vastu"></ul>
</div>

<script>
async function generate() {
    document.getElementById("form").classList.add("hidden");
    document.getElementById("loading").classList.remove("hidden");

    try {
        const dob = document.getElementById("dob").value;
        const time = document.getElementById("time").value;
        const place = document.getElementById("place").value;

        const res = await fetch("/generate", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ dob, time, place })
        });

        const data = await res.json();

        if (!data.success) {
            document.getElementById("loading").classList.add("hidden");
            document.getElementById("form").classList.remove("hidden");
            alert(data.message || "API Failed");
            return;
        }

        const result = data.data;

        document.getElementById("loading").classList.add("hidden");
        document.getElementById("result").classList.remove("hidden");

        document.getElementById("shock").innerText = result.shockLine || "Karmic Alert";
        document.getElementById("score").innerText = result.karmaScore || 0;

        // Reset lists
        const sections = ["life", "symptoms", "remedies", "last", "vastu"];
        sections.forEach(s => document.getElementById(s).innerHTML = "");

        // Fill Life Events (Now supports Year + Event objects)
        (result.lifeEvents || []).forEach(e => {
            const display = typeof e === 'object' ? `<b>${e.year}:</b> ${e.event}` : e;
            document.getElementById("life").innerHTML += `<li>${display}</li>`;
        });

        (result.symptoms || []).forEach(e => {
            document.getElementById("symptoms").innerHTML += `<li>${e}</li>`;
        });

        (result.remedies || []).forEach(e => {
            document.getElementById("remedies").innerHTML += `<li>${e}</li>`;
        });

        // Fill Vastu Tips
        (result.vastuTips || []).forEach(e => {
            document.getElementById("vastu").innerHTML += `<li>${e}</li>`;
        });

        // Handle Last 2 Hours (Array or String)
        const lastData = Array.isArray(result.last2Hours) ? result.last2Hours : [result.last2Hours];
        lastData.forEach(e => {
            document.getElementById("last").innerHTML += `<li>${e}</li>`;
        });

        // 🪐 KUNDLI RENDERING
        for (let i = 1; i <= 12; i++) {
            document.getElementById("h" + i).innerHTML = `<b>H${i}</b>`;
        }

        if (result.kundali && result.kundali.planets) {
            result.kundali.planets.forEach(p => {
                if (p.house) {
                    const houseDiv = document.getElementById("h" + p.house);
                    houseDiv.innerHTML += `<div style="color:#60a5fa; font-weight:bold;">${p.name}</div>`;
                }
            });
        }

    } catch (err) {
        console.error("❌ ERROR:", err);
        alert("Connection lost. Please try again.");
        document.getElementById("loading").classList.add("hidden");
        document.getElementById("form").classList.remove("hidden");
    }
}
</script>
