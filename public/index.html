<!DOCTYPE html>
<html>
<head>
<title>Karma App</title>
<style>
body { background:#0f172a; color:white; text-align:center; font-family:Arial;}
.card { background:#1e293b; padding:15px; margin:10px; border-radius:10px;}
button { padding:10px; background:orange; border:none; }
</style>
</head>

<body>

<h2>🔮 Check Your Karma</h2>

<input type="date" id="dob">
<input type="time" id="time">
<input type="text" id="place" placeholder="Place">
<button onclick="generate()">Check</button>

<div id="result"></div>

<script>
async function generate() {

    const dob = document.getElementById("dob").value;
    const time = document.getElementById("time").value;
    const place = document.getElementById("place").value;

    const res = await fetch("/generate", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ dob, time, place })
    });

    const data = await res.json();

    if (!data.success) {
        alert(data.message);
        return;
    }

    const d = data.data;

    let html = `
    <div class="card">
        <h3>${d.shockLine}</h3>
        <p>Karma Score: ${d.karmaScore}</p>
    </div>

    <div class="card">
        <h4>Kundli</h4>
        ${d.kundali.planets.map(p => `<p>${p.name} → ${p.rasi.name}</p>`).join("")}
    </div>

    <div class="card">
        <h4>Life Events</h4>
        ${d.lifeEvents.map(e => `<p>${e}</p>`).join("")}
    </div>

    <div class="card">
        <h4>Symptoms</h4>
        ${d.symptoms.map(e => `<p>${e}</p>`).join("")}
    </div>
    `;

    document.getElementById("result").innerHTML = html;
}
</script>

</body>
</html>
