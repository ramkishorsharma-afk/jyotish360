<!DOCTYPE html>
<html>
<head>
    <title>Jyotish360 🔮</title>
    <style>
        body {
            font-family: Arial;
            background: #0f172a;
            color: white;
            text-align: center;
            padding: 20px;
        }
        input, button {
            padding: 10px;
            margin: 5px;
            width: 250px;
        }
        .card {
            background: #1e293b;
            padding: 15px;
            margin-top: 20px;
            border-radius: 10px;
        }
    </style>
</head>
<body>

<h2>🔮 Jyotish360</h2>

<input id="name" placeholder="Name"><br>
<input id="dob" placeholder="DOB (DD-MM-YYYY)"><br>
<input id="time" placeholder="Time (HH:MM)"><br>
<input id="place" placeholder="Place"><br>

<button onclick="generate()">✨ Reveal My Destiny</button>

<div id="result"></div>

<script>
async function generate() {
    const res = await fetch('/generate', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({
            name: document.getElementById('name').value,
            dob: document.getElementById('dob').value,
            time: document.getElementById('time').value,
            place: document.getElementById('place').value
        })
    });

    const data = await res.json();

    if (!data.success) {
        document.getElementById('result').innerHTML = data.message;
        return;
    }

    const k = data.data.kundali;

    document.getElementById('result').innerHTML = `
    <div class="card">
        <h3>📊 Kundali</h3>
        Moon: ${k.moonSign}<br>
        Sun: ${k.sunSign}<br>
        Nakshatra: ${k.nakshatra} (Pada ${k.pada})<br>
    </div>

    <div class="card">
        <h3>🪐 Planets</h3>
        ${k.planets.map(p => `${p.name} → ${p.sign}`).join('<br>')}
    </div>

    <div class="card">
        <h3>🔮 Insight</h3>
        ${data.data.pastLife}
    </div>
    `;
}
</script>

</body>
</html>
