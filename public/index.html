<!DOCTYPE html>
<html>
<head>
    <title>Jyotish360</title>
</head>
<body>

<h2>Jyotish360 🔮</h2>

<input id="name" placeholder="Enter Name"><br><br>
<input id="dob" placeholder="Date of Birth"><br><br>
<input id="place" placeholder="Place"><br><br>

<button onclick="generate()">Get My Reading</button>

<div id="result" style="margin-top:20px;"></div>

<button onclick="pay()">Unlock Next 2 Hours 🔒 ₹9</button>

<script>
async function generate() {
    const res = await fetch('/generate', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({
            name: document.getElementById('name').value,
            dob: document.getElementById('dob').value,
            place: document.getElementById('place').value
        })
    });

    const data = await res.json();

    document.getElementById('result').innerHTML = `
        <h3>Past Life Insight:</h3>
        <p>${data.data.pastLife}</p>

        <h3>Last 2 Hours:</h3>
        <p>${data.data.last2Hours}</p>

        <h3>Next 2 Hours:</h3>
        <p>🔒 Locked</p>
    `;
}

async function pay() {
    const res = await fetch('/create-order', { method: 'POST' });
    const order = await res.json();

    const options = {
        key: "YOUR_RAZORPAY_KEY",
        amount: order.amount,
        currency: order.currency,
        order_id: order.id,
        handler: function () {
            alert("Payment successful! 🔥");
        }
    };

    const rzp = new Razorpay(options);
    rzp.open();
}
</script>

<script src="https://checkout.razorpay.com/v1/checkout.js"></script>

</body>
</html>
